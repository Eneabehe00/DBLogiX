{% extends "base.html" %}

{% block title %}Reset Password - DBLogiX{% endblock %}

{% block header %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary me-3">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="h2 mb-0"><i class="fas fa-key me-2"></i>Reset Password</h1>
</div>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-lock me-2"></i>Impostazione Nuova Password per {{ user.username }}
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="password" class="form-label">Nuova Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        <div class="form-text">La password deve contenere almeno 6 caratteri.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password2" class="form-label">Conferma Password</label>
                        <input type="password" class="form-control" id="password2" name="password2" required minlength="6">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i>Annulla
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save me-1"></i>Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
